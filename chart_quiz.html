<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>次の5本 — 5分足リーディング訓練</title>
<style>
:root{
  --bg:#0a0c10;        /* 端末の消灯色 */
  --panel:#12161d;
  --line:#232a35;
  --text:#d7dde6;
  --dim:#7d8794;
  --up:#e8483f;        /* 陽線=赤(日本式) */
  --down:#2e9bd6;      /* 陰線=青 */
  --amber:#f0a92e;     /* カットライン/強調 */
  --ok:#3ecf8e;
  --ng:#e8483f;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--text);font-family:-apple-system,"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;height:100%;
  -webkit-user-select:none;user-select:none;-webkit-touch-callout:none}
input,textarea{-webkit-user-select:text;user-select:text} /* ファイル選択等の操作は妨げない */
.num{font-family:ui-monospace,"SF Mono",Menlo,monospace;font-variant-numeric:tabular-nums}
#app{max-width:560px;margin:0 auto;padding:12px 12px 28px;display:flex;flex-direction:column;gap:12px}
header{display:flex;justify-content:space-between;align-items:baseline;border-bottom:1px solid var(--line);padding-bottom:8px}
header h1{font-size:15px;font-weight:700;letter-spacing:.06em}
header h1 span{color:var(--amber)}
#score{font-size:12px;color:var(--dim)}
#score b{color:var(--text);font-size:14px}
#meta{display:flex;justify-content:space-between;font-size:12px;color:var(--dim)}
#meta .sym{color:var(--text);font-weight:600}
#chartWrap{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:8px 4px 4px;position:relative}
canvas{display:block;width:100%;touch-action:none}
#cutLabel{position:absolute;top:10px;font-size:10px;color:var(--amber);letter-spacing:.08em;transform:translateX(-50%);pointer-events:none;white-space:nowrap}
#choices{display:grid;grid-template-columns:1fr 1fr 1fr 1fr 1fr;gap:6px}
#choices button{
  padding:14px 2px;border-radius:8px;border:1px solid var(--line);background:var(--panel);
  color:var(--text);font-size:13px;font-weight:600;cursor:pointer;line-height:1.3;
}
#choices button small{display:block;font-size:9px;color:var(--dim);font-weight:400;margin-top:3px}
#choices button:active{background:#1a2029}
#choices button.correct{border-color:var(--ok);color:var(--ok)}
#choices button.wrong{border-color:var(--ng);color:var(--ng)}
#choices button:disabled{opacity:.9}
#verdict{min-height:52px;background:var(--panel);border:1px solid var(--line);border-radius:8px;
  padding:10px 12px;font-size:13px;line-height:1.55;display:none}
#verdict.show{display:block}
#verdict .big{font-size:15px;font-weight:700}
#verdict .ok{color:var(--ok)} #verdict .ng{color:var(--ng)}
#verdict .expl{margin-top:8px;padding-top:8px;border-top:1px solid var(--line);color:var(--text)}
#verdict .tag{display:inline-block;background:#1f2733;border:1px solid var(--amber);color:var(--amber);
  border-radius:4px;padding:1px 7px;font-size:11px;font-weight:700;margin-right:6px;vertical-align:1px}
#verdict .disc{display:block;margin-top:5px;font-size:10px;color:var(--dim)}
#nextBtn{display:none;padding:14px;border-radius:8px;border:none;background:var(--amber);
  color:#14100a;font-size:15px;font-weight:700;cursor:pointer}
#nextBtn.show{display:block}
#setup{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:14px;font-size:13px;line-height:1.7}
#setup h2{font-size:13px;color:var(--amber);margin-bottom:6px}
#setup label{display:block;margin:10px 0 4px;color:var(--dim);font-size:12px}
#setup input[type=file]{width:100%;font-size:12px;color:var(--dim)}
#setup .row{display:flex;gap:8px;margin-top:12px}
#setup button{flex:1;padding:12px;border-radius:8px;border:1px solid var(--line);background:#1a2029;color:var(--text);font-size:13px;font-weight:600;cursor:pointer}
#setup button.primary{background:var(--amber);color:#14100a;border:none}
#loadInfo{font-size:11px;color:var(--dim);margin-top:8px;white-space:pre-line}
footer{font-size:10px;color:var(--dim);text-align:center;line-height:1.6}
#statsPanel{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:12px;font-size:12px}
#statsPanel summary{cursor:pointer;color:var(--amber);font-weight:700;font-size:13px;list-style:none}
#statsPanel summary::-webkit-details-marker{display:none}
#statsPanel summary::before{content:"▸ ";display:inline-block}
#statsPanel[open] summary::before{content:"▾ "}
.statsTable{width:100%;border-collapse:collapse;margin-top:10px}
.statsTable th,.statsTable td{padding:5px 6px;text-align:right;border-bottom:1px solid var(--line);font-size:11px}
.statsTable th:first-child,.statsTable td:first-child{text-align:left}
.statsTable th{color:var(--dim);font-weight:600}
.statsTable .bar{display:inline-block;height:6px;background:var(--amber);border-radius:3px;vertical-align:middle;margin-right:4px}
.statsEmpty{color:var(--dim);text-align:center;padding:12px 0}
@media (prefers-reduced-motion: reduce){ .anim{transition:none !important} }
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>次の<span>5本</span> — 5分足リーディング訓練</h1>
    <div style="text-align:right">
      <div id="score" class="num">0/0</div>
      <div id="scoreAll" class="num" style="font-size:10px;color:var(--dim)"></div>
    </div>
  </header>

  <div id="setup">
    <h2>データ読み込み</h2>
    ホスティング時は <span class="num">./data/銘柄コード.csv</span> を自動取得します。手元のCSVを使う場合は下から選択してください（複数可）。<br>
    CSV形式: <span class="num">datetime,open,high,low,close,volume</span>（日本語ヘッダー可）
    <label>ローカルCSVを選択</label>
    <input type="file" id="fileInput" accept=".csv" multiple>
    <div class="row">
      <button class="primary" id="startBtn">開始</button>
      <button id="demoBtn">デモ(合成データ)で試す</button>
    </div>
    <div id="loadInfo"></div>
  </div>

  <div id="meta" style="display:none">
    <div class="sym" id="symLabel">—</div>
    <div class="num" id="dateLabel">日付は回答後に表示</div>
  </div>

  <div id="chartWrap" style="display:none">
    <div id="cutLabel">▼ ここから先を読む</div>
    <canvas id="cv" height="360"></canvas>
  </div>

  <div id="choices" style="display:none">
    <button data-k="2">急騰<small>+1.5ATR超</small></button>
    <button data-k="1">上昇<small>+0.5〜1.5</small></button>
    <button data-k="0">横ばい<small>±0.5内</small></button>
    <button data-k="-1">下降<small>-0.5〜1.5</small></button>
    <button data-k="-2">急落<small>-1.5ATR超</small></button>
  </div>

  <div id="verdict"></div>
  <button id="nextBtn">次の問題</button>

  <details id="statsPanel">
    <summary>成績を見る(銘柄別・時間帯別)</summary>
    <div id="statsBody"><div class="statsEmpty">まだ回答がありません</div></div>
  </details>

  <footer>判定: 5本先の終値変化をATR(14)基準で分類 / 出題: 急騰・急落・転換パターン優先</footer>
</div>

<script>
"use strict";
/* ===== 銘柄マスタ (監視31銘柄) ===== */
const NAMES = {
"285A":"キオクシアHD","6525":"KOKUSAI ELECTRIC","3436":"SUMCO","6613":"QDレーザ","6526":"ソシオネクスト",
"6723":"ルネサス","6315":"TOWA","4062":"イビデン","5016":"JX金属","7735":"SCREEN","6857":"アドバンテスト",
"6146":"ディスコ","8035":"東京エレクトロン","2644":"GX半導体","200A":"NF日経半導体","6920":"レーザーテック",
"5803":"フジクラ","5801":"古河電工",
"6976":"太陽誘電","6981":"村田製作所","6762":"TDK",
"9984":"ソフトバンクG",
"7011":"三菱重工","7012":"川崎重工","6330":"東洋エンジ","7013":"IHI",
"186A":"アストロスケール","464A":"QPS研究所","6323":"ローツェ"
};
const SHOW=20, HIDE=5, WIN=SHOW+HIDE;

/* ===== 状態 ===== */
let DATA={};            // code -> [{t:Date,o,h,l,c,v}]
let POOLS={};           // code -> {hi:[idx], lo:[idx]}
let cur=null;           // 現在の問題
let answered=false, nCorrect=0, nTotal=0, isDemo=false;
let HISTORY=[]; // {code, hour, correct}の配列(銘柄別・時間帯別集計用)
const LS_KEY="chartquiz_history_v1";
function loadHistory(){
  try{
    const raw=localStorage.getItem(LS_KEY);
    if(raw){HISTORY=JSON.parse(raw);}
  }catch(e){HISTORY=[];}
}
function saveHistory(){
  try{localStorage.setItem(LS_KEY,JSON.stringify(HISTORY));}catch(e){/* 容量超過等は無視 */}
}
loadHistory();

/* ===== CSVパース ===== */
function parseCSV(text){
  const lines=text.trim().split(/\r?\n/); if(lines.length<2) return [];
  const head=lines[0].split(",").map(s=>s.trim().toLowerCase());
  const idx=(cands)=>head.findIndex(h=>cands.some(c=>h.includes(c)));
  let iDT=idx(["datetime","日付時刻","日時"]);
  const iD=idx(["date","日付"]), iT=idx(["time","時刻"]);
  const iO=idx(["open","始値"]), iH=idx(["high","高値"]), iL=idx(["low","安値"]),
        iC=idx(["close","終値"]), iV=idx(["volume","出来高"]);
  if(iO<0||iH<0||iL<0||iC<0) return [];
  const out=[];
  for(let i=1;i<lines.length;i++){
    const c=lines[i].split(",");
    let dt;
    if(iDT>=0) dt=new Date(c[iDT].replace(" ","T"));
    else if(iD>=0&&iT>=0) dt=new Date(c[iD].replace(/\//g,"-")+"T"+c[iT]);
    else continue;
    if(isNaN(dt)) continue;
    const o=+c[iO],h=+c[iH],l=+c[iL],cl=+c[iC];
    if(!(o>0&&h>0&&l>0&&cl>0)) continue;
    out.push({t:dt,o,h,l,c:cl,v:iV>=0?+c[iV]||0:0});
  }
  out.sort((a,b)=>a.t-b.t);
  return out;
}

/* ===== 出題候補プール構築 (同一営業日内のみ・ボラ重み) ===== */
/* ===== ATR(14) : 指定インデックスの末尾で計算 ===== */
function atr14(bars,end){
  let s=0,n=0;
  for(let i=Math.max(1,end-13);i<=end;i++){
    const tr=Math.max(bars[i].h-bars[i].l,
      Math.abs(bars[i].h-bars[i-1].c),Math.abs(bars[i].l-bars[i-1].c));
    s+=tr;n++;
  }
  return s/n;
}

/* ===== 出題候補プール構築 =====
   デイトレで押さえたい場面(この後 急騰/急落する, トレンド転換する)を
   優先出題する。「表示20本の値動き」ではなく「隠れた5本の性質」で
   重み付けする点がポイント。 */
function buildPools(code){
  const bars=DATA[code]; if(!bars||bars.length<WIN) return null;
  const dayKey=d=>d.t.getFullYear()*1e4+(d.t.getMonth()+1)*100+d.t.getDate();
  const cands=[], tags=[]; // tags: 'breakout'(急騰/急落) | 'reversal'(転換) | 'plain'(平常)
  for(let s=0;s+WIN<=bars.length;s++){
    if(dayKey(bars[s])!==dayKey(bars[s+WIN-1])) continue;   // 日またぎ除外
    let gapped=false;
    for(let j=s+1;j<s+WIN;j++){
      if(bars[j].t-bars[j-1].t>6*60*1000){gapped=true;break;}
    }
    if(gapped) continue;

    const atr=atr14(bars,s+SHOW-1);
    if(!atr||atr<=0) continue;
    const after=(bars[s+WIN-1].c-bars[s+SHOW-1].c)/atr;      // 先読み5本の変化(ATR比)
    // 表示20本のうち直近5本の傾き(カット直前のモメンタム方向)
    const preTrend=(bars[s+SHOW-1].c-bars[s+SHOW-6].c)/atr;

    let tag="plain";
    if(Math.abs(after)>=1.5) tag="breakout";                  // この後 急騰/急落
    else if(Math.abs(preTrend)>=0.6 && Math.sign(preTrend)!==Math.sign(after) && Math.abs(after)>=0.4)
      tag="reversal";                                         // 直前の流れに対して転換

    cands.push(s); tags.push(tag);
  }
  if(cands.length<10) return null;

  const pools={breakout:[],reversal:[],plain:[]};
  cands.forEach((s,i)=>pools[tags[i]].push(s));
  return pools;
}
const classify=r=> r>=1.5?2 : r>=0.5?1 : r>-0.5?0 : r>-1.5?-1 : -2;
const KLABEL={2:"急騰",1:"上昇",0:"横ばい","-1":"下降","-2":"急落"};
const fmt=v=>v>=100?Math.round(v).toLocaleString():v.toFixed(1);

/* ===== テクニカル自動解析(ルールベース・参考) ===== */
function swings(bars,k=2){
  const hi=[],lo=[];
  for(let i=k;i<bars.length-k;i++){
    let isH=true,isL=true;
    for(let j=1;j<=k;j++){
      if(bars[i].h<bars[i-j].h||bars[i].h<bars[i+j].h)isH=false;
      if(bars[i].l>bars[i-j].l||bars[i].l>bars[i+j].l)isL=false;
    }
    if(isH)hi.push(i); if(isL)lo.push(i);
  }
  return {hi,lo};
}
function clusterLevels(idxs,bars,key,tol){
  const lv=[];
  idxs.forEach(i=>{
    const p=bars[i][key];
    const f=lv.find(L=>Math.abs(L.p-p)<=tol);
    if(f){f.n++;f.p=(f.p*(f.n-1)+p)/f.n;f.idx.push(i);}
    else lv.push({p,n:1,idx:[i]});
  });
  return lv.filter(L=>L.n>=2).sort((a,b)=>b.n-a.n);
}
function linSlope(pts){
  const n=pts.length; if(n<2)return 0;
  let sx=0,sy=0,sxy=0,sxx=0;
  pts.forEach(p=>{sx+=p.x;sy+=p.y;sxy+=p.x*p.y;sxx+=p.x*p.x;});
  return (n*sxy-sx*sy)/(n*sxx-sx*sx||1);
}
function distinctPeaks(L,bars,atr,key){
  // 「山→谷(1ATR以上の押し)→山」が成立している回数を数える
  if(!L||L.idx.length<2)return L?L.idx.length:0;
  const ids=[...L.idx].sort((a,b)=>a-b); let count=1;
  for(let k=1;k<ids.length;k++){
    const a=ids[k-1],b=ids[k];
    if(b-a<3)continue;                       // 山の間隔3本以上
    let valley=key==="h"?Infinity:-Infinity;
    for(let j=a+1;j<b;j++)
      valley=key==="h"?Math.min(valley,bars[j].l):Math.max(valley,bars[j].h);
    const depth=key==="h"?(L.p-valley):(valley-L.p);
    if(depth>=atr)count++;                   // 谷の深さ1ATR以上
  }
  return count;
}
function analyze(bars,atr){
  const n=bars.length, tol=atr*0.4, c=bars[n-1].c;
  const sw=swings(bars);
  const res=clusterLevels(sw.hi,bars,"h",tol).filter(L=>L.p>c-tol);
  const sup=clusterLevels(sw.lo,bars,"l",tol).filter(L=>L.p<c+tol);
  const net=(bars[n-1].c-bars[0].c)/atr;
  const half=Math.floor(n/2);
  const first=(bars[half].c-bars[0].c)/atr;
  const second=(bars[n-1].c-bars[half].c)/atr;
  let h2=-1e9,l2=1e9;
  for(let i=half;i<n;i++){h2=Math.max(h2,bars[i].h);l2=Math.min(l2,bars[i].l);}
  const band2=(h2-l2)/atr;
  let hA=-1e9,lA=1e9; bars.forEach(b=>{hA=Math.max(hA,b.h);lA=Math.min(lA,b.l);});
  const bandAll=(hA-lA)/atr;
  const hiS=sw.hi.length>=2?linSlope(sw.hi.map(i=>({x:i,y:bars[i].h})))/atr:0;
  const loS=sw.lo.length>=2?linSlope(sw.lo.map(i=>({x:i,y:bars[i].l})))/atr:0;

  let pattern=null;
  const T=res[0], B=sup[0], FLAT=0.03, SLP=0.035;
  const pkT=T?distinctPeaks(T,bars,atr,"h"):0, pkB=B?distinctPeaks(B,bars,atr,"l"):0;
  if(sw.hi.length>=2&&sw.lo.length>=2&&hiS<-SLP&&loS>SLP) pattern="シンメトリカルトライアングル";
  else if(sw.hi.length>=2&&sw.lo.length>=2&&Math.abs(hiS)<FLAT&&loS>SLP) pattern="アセンディングトライアングル";
  else if(sw.hi.length>=2&&sw.lo.length>=2&&Math.abs(loS)<FLAT&&hiS<-SLP) pattern="ディセンディングトライアングル";
  else if(Math.abs(first)>=1.2&&Math.abs(second)<=0.5&&band2<=1.6)
    pattern=first>0?"上昇フラッグ":"下降フラッグ";
  else if(bandAll<=2.2&&Math.abs(net)<=0.6) pattern="ボックス(持ち合い)";
  else if(pkT>=3) pattern="トリプルトップ/ライントップ";
  else if(pkB>=3) pattern="トリプルボトム/ラインボトム";
  else if(pkT===2&&c<T.p-tol*0.5) pattern="ダブルトップ";
  else if(pkB===2&&c>B.p+tol*0.5) pattern="ダブルボトム";
  else if(net>=1.5&&loS>0) pattern="上昇トレンド(安値切り上げ)";
  else if(net<=-1.5&&hiS<0) pattern="下降トレンド(高値切り下げ)";
  // 直近5本の反転兆候をラベルに反映(全体形状と直近の食い違い対策)
  const recent=(bars[n-1].c-bars[n-4].c)/atr;
  if(pattern&&pattern.startsWith("下降トレンド")&&recent>=0.5)
    pattern+=" → 直近は反発の初動";
  else if(pattern&&pattern.startsWith("上昇トレンド")&&recent<=-0.5)
    pattern+=" → 直近は押し目形成中";
  return {res,sup,net,pattern};
}
function explainOutcome(cur){
  const barsV=cur.bars.slice(0,SHOW), atr=cur.atr, a=cur.analysis, c0=barsV[SHOW-1].c;
  const hid=cur.bars.slice(SHOW);
  const hidHi=Math.max(...hid.map(b=>b.h)), hidLo=Math.min(...hid.map(b=>b.l)), cEnd=hid[hid.length-1].c;
  const dir=cur.move; // 実際の方向(ATR比、+なら上昇/-なら下落)
  const up=dir>0;

  const reasons=[]; // 実際の方向を支えたテクニカル要因

  // --- 水平線(支持線・抵抗線)のブレイク/反発 ---
  if(a.res[0]){const R=a.res[0].p;
    if(c0<R&&hidHi>R+atr*0.2&&cEnd>R)
      reasons.push(`${a.res[0].n}回止められていた抵抗線${fmt(R)}円を明確にブレイク`);
    else if(c0<R&&hidHi>=R-atr*0.3&&cEnd<R&&!up)
      reasons.push(`抵抗線${fmt(R)}円に上値を抑えられて反落`);
  }
  if(a.sup[0]){const S=a.sup[0].p;
    if(c0>S&&hidLo<S-atr*0.2&&cEnd<S)
      reasons.push(`${a.sup[0].n}回支えられていた支持線${fmt(S)}円を明確に割り込み`);
    else if(c0>S&&hidLo<=S+atr*0.3&&cEnd>S&&up)
      reasons.push(`支持線${fmt(S)}円で下げ止まり反発`);
  }

  // --- VWAP・移動平均線のクロス/位置関係 ---
  const crossEvent=(arr,label)=>{
    if(!arr) return null;
    const before=arr[SHOW-1]; if(before==null) return null;
    let finalAbove=null;
    for(let i=SHOW;i<WIN;i++){
      const lineVal=arr[i]; if(lineVal==null) continue;
      const price=cur.bars[i].c;
      if(price>lineVal+atr*0.1) finalAbove=true;
      else if(price<lineVal-atr*0.1) finalAbove=false;
    }
    if(finalAbove===true && c0<=before) return `${label}を上抜けて上昇を後押し`;
    if(finalAbove===false && c0>=before) return `${label}を下抜けて下落を後押し`;
    if(finalAbove===true && c0>before) return `${label}の上を維持したまま推移`;
    if(finalAbove===false && c0<before) return `${label}の下を維持したまま推移`;
    return null;
  };
  const vwapEv=crossEvent(cur.vwap,"VWAP"); if(vwapEv) reasons.push(vwapEv);
  const ma25Ev=crossEvent(cur.ma25,"MA25"); if(ma25Ev) reasons.push(ma25Ev);

  // --- MA5/MA25のクロス(直前に起きていた場合、それが継続の理由になる) ---
  const m5=cur.ma5?cur.ma5[SHOW-1]:null, m25=cur.ma25?cur.ma25[SHOW-1]:null;
  if(m5!=null&&m25!=null){
    let crossed=null;
    for(let i=SHOW-6;i<SHOW;i++){
      if(i<1||cur.ma5[i-1]==null||cur.ma25[i-1]==null)continue;
      const p=cur.ma5[i-1]-cur.ma25[i-1], q=cur.ma5[i]-cur.ma25[i];
      if(p>=0&&q<0)crossed="dead"; if(p<=0&&q>0)crossed="golden";
    }
    if(crossed==="golden"&&up) reasons.push("直前のMA5ゴールデンクロスに沿った上昇");
    else if(crossed==="dead"&&!up) reasons.push("直前のMA5デッドクロスに沿った下落");
  }

  // --- 直近の勢い(モメンタム)の継続 ---
  const recent=(barsV[SHOW-1].c-barsV[SHOW-4].c)/atr;
  if(Math.sign(recent)===Math.sign(dir)&&Math.abs(recent)>=0.4&&Math.abs(dir)>=0.5)
    reasons.push("カット直前の勢いがそのまま継続");
  else if(Math.sign(recent)!==Math.sign(dir)&&Math.abs(recent)>=0.4&&Math.abs(dir)>=0.5)
    reasons.push("カット直前の流れに対する反転(行き過ぎの修正)");

  if(!reasons.length)
    reasons.push(Math.abs(dir)<0.5
      ? "支持線・抵抗線・移動平均線のいずれにも接近しておらず、方向感のないまま推移"
      : "明確な水平線やMAの節目を伴わない、需給主導の値動き");

  return reasons.join("。") + "。";
}

/* ===== 出題 ===== */
function nextQuestion(){
  const codes=Object.keys(POOLS); if(!codes.length) return;
  // 銘柄をまたいで、breakout/reversal/plainの候補を集約してから重み付け抽選する
  // (銘柄ごとに先に選ぶと、候補の少ない銘柄が過小/過大評価されるため)
  const r=Math.random();
  const wantTag = r<0.5 ? "breakout" : r<0.8 ? "reversal" : "plain";

  let code=null, pool=null;
  const tryOrder=[wantTag,"breakout","reversal","plain"];
  for(const tag of tryOrder){
    const withCode=codes.filter(c=>POOLS[c][tag] && POOLS[c][tag].length);
    if(withCode.length){
      code=withCode[Math.floor(Math.random()*withCode.length)];
      pool=POOLS[code][tag];
      break;
    }
  }
  if(!pool) return;

  const s=pool[Math.floor(Math.random()*pool.length)];
  const bars=DATA[code].slice(s,s+WIN);
  const atr=atr14(bars,SHOW-1);
  const move=(bars[WIN-1].c-bars[SHOW-1].c)/atr;
  cur={code,bars,atr,move,ans:classify(move),reveal:0};
  cur.analysis=analyze(bars.slice(0,SHOW),atr);
  // 移動平均(窓より前の足も使って正確に計算)
  const full=DATA[code];
  const maCalc=p=>Array.from({length:WIN},(_,i)=>{
    const gi=s+i; if(gi<p-1)return null;
    let sum=0;for(let j=gi-p+1;j<=gi;j++)sum+=full[j].c;
    return sum/p;
  });
  cur.ma5=maCalc(5); cur.ma25=maCalc(25);

  // VWAP: 当日の最初の足(直前の足と日付が変わる位置)まで遡って累積計算
  const dayKey=d=>d.t.getFullYear()*1e4+(d.t.getMonth()+1)*100+d.t.getDate();
  let dayStart=s;
  while(dayStart>0 && dayKey(full[dayStart-1])===dayKey(full[s])) dayStart--;
  let cumPV=0, cumV=0;
  const vwapFull=[];
  for(let j=dayStart;j<s+WIN;j++){
    const typical=(full[j].h+full[j].l+full[j].c)/3;
    const v=full[j].v||0;
    cumPV+=typical*v; cumV+=v;
    vwapFull[j]= cumV>0 ? cumPV/cumV : typical;
  }
  cur.vwap=Array.from({length:WIN},(_,i)=>vwapFull[s+i] ?? null);
  answered=false;
  document.getElementById("symLabel").textContent=code+" "+(NAMES[code]||"")+(isDemo?"(デモ)":"");
  document.getElementById("dateLabel").textContent="日付は回答後に表示";
  document.getElementById("verdict").className="";
  document.getElementById("verdict").innerHTML="";
  document.getElementById("nextBtn").className="";
  document.querySelectorAll("#choices button").forEach(b=>{b.disabled=false;b.className="";});
  draw();
}

/* ===== 描画 ===== */
function draw(){
  const cvs=document.getElementById("cv"), wrap=document.getElementById("chartWrap");
  const W=wrap.clientWidth-8, H=360, dpr=window.devicePixelRatio||1;
  cvs.width=W*dpr; cvs.height=H*dpr; cvs.style.height=H+"px";
  const ctx=cvs.getContext("2d"); ctx.scale(dpr,dpr);
  ctx.clearRect(0,0,W,H);
  if(!cur) return;
  const vis=cur.bars.slice(0,SHOW+cur.reveal);
  const all=cur.bars;
  let hi=-Infinity,lo=Infinity;
  all.forEach(b=>{hi=Math.max(hi,b.h);lo=Math.min(lo,b.l);});   // 全域スケール固定(種明かし時に軸が動かないように)
  [cur.ma5,cur.ma25,cur.vwap].forEach(arr=>arr&&arr.forEach(v=>{if(v!=null){hi=Math.max(hi,v);lo=Math.min(lo,v);}}));
  const pad=(hi-lo)*0.08; hi+=pad; lo-=pad;
  const padL=6,padR=52,padT=26,padB=14, VH=46, PH=H-padT-padB-VH-8;
  const cw=(W-padL-padR)/WIN;
  const y=v=>padT+(hi-v)/(hi-lo)*PH;

  ctx.strokeStyle="#1a212b"; ctx.lineWidth=1;
  for(let g=0;g<5;g++){const gy=padT+g*PH/4;
    ctx.beginPath();ctx.moveTo(padL,gy);ctx.lineTo(W-padR,gy);ctx.stroke();
    ctx.fillStyle="#57606d";ctx.font="10px ui-monospace,monospace";ctx.textAlign="left";
    ctx.fillText((hi-(hi-lo)*g/4).toFixed(0),W-padR+4,gy+3);
  }
  // カットライン
  const cutX=padL+SHOW*cw;
  ctx.setLineDash([4,4]);ctx.strokeStyle="#f0a92e";ctx.beginPath();
  ctx.moveTo(cutX,padT-6);ctx.lineTo(cutX,H-padB);ctx.stroke();ctx.setLineDash([]);
  const lbl=document.getElementById("cutLabel");
  lbl.style.left=(cutX+4)+"px";

  vis.forEach((b,i)=>{
    const x=padL+i*cw+cw/2, up=b.c>=b.o;
    ctx.strokeStyle=ctx.fillStyle=up?"#e8483f":"#2e9bd6";
    ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(x,y(b.h));ctx.lineTo(x,y(b.l));ctx.stroke();
    const bw=Math.max(2,cw*0.62);
    const top=y(Math.max(b.o,b.c)), bh=Math.max(1,Math.abs(y(b.o)-y(b.c)));
    if(up){ctx.fillStyle="#0a0c10";ctx.fillRect(x-bw/2,top,bw,bh);
      ctx.strokeRect(x-bw/2,top,bw,bh);}          // 陽線=白抜き赤枠(日本式)
    else ctx.fillRect(x-bw/2,top,bw,bh);
  });
  // 出来高(下段)
  let vMax=1; all.forEach(b=>vMax=Math.max(vMax,b.v||0));
  if(vMax>1){
    ctx.strokeStyle="#1a212b";ctx.beginPath();
    ctx.moveTo(padL,H-padB-VH-4);ctx.lineTo(W-padR,H-padB-VH-4);ctx.stroke();
    vis.forEach((b,i)=>{
      const x=padL+i*cw+cw/2, bw=Math.max(2,cw*0.62);
      const vh=(b.v||0)/vMax*VH;
      ctx.fillStyle=b.c>=b.o?"rgba(232,72,63,.45)":"rgba(46,155,214,.45)";
      ctx.fillRect(x-bw/2,H-padB-vh,bw,vh);
    });
    ctx.fillStyle="#57606d";ctx.font="9px ui-monospace,monospace";ctx.textAlign="left";
    ctx.fillText("出来高",padL+2,H-padB-VH+4);
  }
  // 移動平均線(表示済みの本数まで)
  if(cur.ma5){
    const drawMA=(arr,color)=>{
      ctx.strokeStyle=color;ctx.lineWidth=1.3;ctx.beginPath();let st=false;
      for(let i=0;i<SHOW+cur.reveal;i++){
        if(arr[i]==null)continue;
        const x=padL+i*cw+cw/2;
        if(!st){ctx.moveTo(x,y(arr[i]));st=true;}else ctx.lineTo(x,y(arr[i]));
      }
      ctx.stroke();
    };
    drawMA(cur.ma5,"#f2d15c"); drawMA(cur.ma25,"#b07cf7");
    if(cur.vwap){
      ctx.setLineDash([3,2]);
      drawMA(cur.vwap,"#8fd6ff");
      ctx.setLineDash([]);
    }
    ctx.font="9px ui-monospace,monospace";ctx.textAlign="left";
    ctx.fillStyle="#f2d15c";ctx.fillText("MA5",padL+2,padT-12);
    ctx.fillStyle="#b07cf7";ctx.fillText("MA25",padL+32,padT-12);
    ctx.fillStyle="#8fd6ff";ctx.fillText("VWAP",padL+65,padT-12);
  }
  // 基準終値ライン
  const base=cur.bars[SHOW-1].c;
  ctx.setLineDash([2,3]);ctx.strokeStyle="#57606d";ctx.beginPath();
  ctx.moveTo(padL,y(base));ctx.lineTo(W-padR,y(base));ctx.stroke();ctx.setLineDash([]);
  // 回答後: 検出した支持線・抵抗線を表示
  if(cur.reveal>0&&cur.analysis){
    ctx.font="9px ui-monospace,monospace";ctx.textAlign="left";
    cur.analysis.res.slice(0,2).forEach(L=>{
      ctx.setLineDash([6,3]);ctx.strokeStyle="rgba(232,72,63,.55)";ctx.beginPath();
      ctx.moveTo(padL,y(L.p));ctx.lineTo(W-padR,y(L.p));ctx.stroke();ctx.setLineDash([]);
      ctx.fillStyle="rgba(232,72,63,.9)";ctx.fillText("R "+fmt(L.p),padL+2,y(L.p)-3);
    });
    cur.analysis.sup.slice(0,2).forEach(L=>{
      ctx.setLineDash([6,3]);ctx.strokeStyle="rgba(62,207,142,.55)";ctx.beginPath();
      ctx.moveTo(padL,y(L.p));ctx.lineTo(W-padR,y(L.p));ctx.stroke();ctx.setLineDash([]);
      ctx.fillStyle="rgba(62,207,142,.9)";ctx.fillText("S "+fmt(L.p),padL+2,y(L.p)+10);
    });
  }
}

/* ===== 銘柄別・時間帯別 成績集計 ===== */
function renderStats(){
  const body=document.getElementById("statsBody");
  if(!HISTORY.length){body.innerHTML='<div class="statsEmpty">まだ回答がありません</div>';return;}

  const byCode={}, byHour={};
  HISTORY.forEach(h=>{
    (byCode[h.code]=byCode[h.code]||{n:0,c:0}).n++;
    if(h.correct)byCode[h.code].c++;
    (byHour[h.hour]=byHour[h.hour]||{n:0,c:0}).n++;
    if(h.correct)byHour[h.hour].c++;
  });

  const row=(label,n,c)=>{
    const pct=Math.round(c/n*100);
    return `<tr><td>${label}</td><td class="num">${c}/${n}</td>
      <td class="num"><span class="bar" style="width:${Math.max(4,pct*0.4)}px"></span>${pct}%</td></tr>`;
  };

  const codeRows=Object.entries(byCode)
    .sort((a,b)=>b[1].n-a[1].n)
    .map(([code,s])=>row(`${code} ${NAMES[code]||""}`,s.n,s.c)).join("");

  const hourRows=Object.entries(byHour)
    .sort((a,b)=>+a[0]-+b[0])
    .map(([hour,s])=>row(`${hour}時台`,s.n,s.c)).join("");

  body.innerHTML=`
    <div style="font-size:11px;color:var(--dim);margin-bottom:4px">銘柄別</div>
    <table class="statsTable"><tr><th>銘柄</th><th>正解</th><th>正答率</th></tr>${codeRows}</table>
    <div style="font-size:11px;color:var(--dim);margin:12px 0 4px">時間帯別(カット時点の時刻)</div>
    <table class="statsTable"><tr><th>時間帯</th><th>正解</th><th>正答率</th></tr>${hourRows}</table>`;
}

/* ===== 回答処理 ===== */
function answer(k){
  if(!cur||answered) return;
  answered=true; nTotal++;
  const good=(k===cur.ans); if(good) nCorrect++;
  const cutTime=cur.bars[SHOW-1].t;
  HISTORY.push({code:cur.code, hour:cutTime.getHours(), correct:good});
  saveHistory();
  renderStats();
  document.getElementById("score").innerHTML=`<b>${nCorrect}</b>/${nTotal} (${Math.round(nCorrect/nTotal*100)}%)`;
  const allC=HISTORY.filter(h=>h.correct).length;
  document.getElementById("scoreAll").textContent=`累計 ${allC}/${HISTORY.length}`;
  document.querySelectorAll("#choices button").forEach(b=>{
    b.disabled=true;
    const bk=+b.dataset.k;
    if(bk===cur.ans) b.classList.add("correct");
    else if(bk===k) b.classList.add("wrong");
  });
  const d=cur.bars[SHOW-1].t;
  document.getElementById("dateLabel").textContent=
    `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}時点`;
  // 1本ずつ種明かし
  const reduced=matchMedia("(prefers-reduced-motion: reduce)").matches;
  const step=()=>{
    cur.reveal++; draw();
    if(cur.reveal<HIDE) setTimeout(step,reduced?0:480);
    else showVerdict(good,k);
  };
  setTimeout(step,reduced?0:350);
}
function showVerdict(good,k){
  const pct=((cur.bars[WIN-1].c-cur.bars[SHOW-1].c)/cur.bars[SHOW-1].c*100);
  const v=document.getElementById("verdict");
  const pat=cur.analysis.pattern;
  v.innerHTML=`<span class="big ${good?"ok":"ng"}">${good?"正解":"不正解"}</span> — 実際は「${KLABEL[cur.ans]}」
  <br>5本先: <span class="num">${pct>=0?"+":""}${pct.toFixed(2)}%</span> ／ ATR比 <span class="num">${cur.move>=0?"+":""}${cur.move.toFixed(2)}</span>
  ${good?"":`（あなたの回答: ${KLABEL[k]}）`}
  <div class="expl">${pat?`<span class="tag">${pat}</span>`:""}${explainOutcome(cur)}。
  <span class="disc">※価格構造のみのルールベース自動解析(参考)</span></div>`;
  v.className="show";
  document.getElementById("nextBtn").className="show";
}

/* ===== デモデータ(合成・訓練用ではない旨明示) ===== */
function makeDemo(){
  isDemo=true; DATA={}; POOLS={};
  const codes=["3436","5803","6857"];
  codes.forEach(code=>{
    const bars=[]; let price=3000+Math.random()*4000, vol=0.0015;
    for(let day=0;day<60;day++){
      const base=new Date(2026,3,1+day); if(base.getDay()===0||base.getDay()===6) continue;
      price*=1+(Math.random()-0.5)*0.02;
      for(let m=0;m<54;m++){
        const hh=m<30?9+Math.floor(m/12):12, t=new Date(base);
        t.setHours(9,0,0,0); t.setMinutes(m*5+(m>=30?60:0));
        vol=Math.max(0.0006,Math.min(0.006,vol*0.97+Math.abs(Math.random()-0.5)*0.0012));
        const o=price, drift=(Math.random()-0.5)*2*vol*o;
        const c2=o+drift, h=Math.max(o,c2)+Math.random()*vol*o, l=Math.min(o,c2)-Math.random()*vol*o;
        bars.push({t,o,h,l,c:c2,v:Math.round(Math.random()*5e4)});
        price=c2;
      }
    }
    DATA[code]=bars; const p=buildPools(code); if(p) POOLS[code]=p;
  });
}

/* ===== 起動・読み込み ===== */
async function tryHosted(){
  const codes=Object.keys(NAMES); const info=[];
  for(const code of codes){
    try{
      const r=await fetch(`./data/${code}.csv`,{cache:"no-store"});
      if(!r.ok) continue;
      const bars=parseCSV(await r.text());
      if(bars.length>=WIN){DATA[code]=bars;const p=buildPools(code);if(p){POOLS[code]=p;info.push(code);}}
    }catch(e){}
  }
  return info;
}
document.getElementById("fileInput").addEventListener("change",async e=>{
  const info=document.getElementById("loadInfo"); let ok=0;
  for(const f of e.target.files){
    const code=f.name.replace(/\.csv$/i,"").toUpperCase();
    const bars=parseCSV(await f.text());
    if(bars.length>=WIN){DATA[code]=bars;const p=buildPools(code);if(p){POOLS[code]=p;ok++;}}
  }
  isDemo=false;
  info.textContent=`${ok}銘柄を読み込みました（${Object.keys(POOLS).join(", ")}）`;
});
document.getElementById("startBtn").addEventListener("click",async()=>{
  const info=document.getElementById("loadInfo");
  if(!Object.keys(POOLS).length){
    info.textContent="ホスティングされたCSVを確認中…";
    const got=await tryHosted();
    if(!got.length){info.textContent="データが見つかりません。CSVを選択するか、デモで試してください。";return;}
    info.textContent=`${got.length}銘柄を読み込みました`;
  }
  startQuiz();
});
document.getElementById("demoBtn").addEventListener("click",()=>{makeDemo();startQuiz();});
function startQuiz(){
  document.getElementById("setup").style.display="none";
  ["meta","chartWrap","choices"].forEach(id=>document.getElementById(id).style.display="");
  nextQuestion();
}
document.querySelectorAll("#choices button").forEach(b=>b.addEventListener("click",()=>answer(+b.dataset.k)));
document.getElementById("nextBtn").addEventListener("click",nextQuestion);
window.addEventListener("resize",draw);
renderStats(); // 起動時、過去のlocalStorage分の成績を反映

document.addEventListener("gesturestart",e=>e.preventDefault());
document.addEventListener("contextmenu",e=>e.preventDefault());
document.addEventListener("copy",e=>e.preventDefault());
document.addEventListener("selectstart",e=>{
  if(!["INPUT","TEXTAREA"].includes(e.target.tagName)) e.preventDefault();
});
document.addEventListener("gesturechange",e=>e.preventDefault());
document.addEventListener("touchmove",e=>{ if(e.touches.length>1) e.preventDefault(); },{passive:false});

document.addEventListener("touchend",e=>{
  const now=Date.now();
  if(now-lastTapTime<300) e.preventDefault();
  lastTapTime=now;
},{passive:false});
</script>
